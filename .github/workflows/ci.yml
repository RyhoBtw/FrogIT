name: ci
on:
  pull_request:
  release:
    types: [published]
  push:
    tags:
    branches:
      - main
      - develop

env:
  CLANG_TIDY_VERSION: "19.1.1"
  VERBOSE: 1


jobs:
  # Lizard: Zyklomatische Komplexität & Halstead-Metriken
  # Once per commits
  Complexity:
    name: Code Complexity (Lizard)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Lizard
        run: pip install lizard --quiet

      # Analyse läuft über den gesamten src/-Ordner.
      # --CCN 10  → Warnung, wenn zyklomatische Komplexität > 10
      # --length 75 → Warnung, wenn Funktion länger als 75 Zeilen
      # --warnings_only → gibt nur Funktionen aus, die Schwellwerte überschreiten
      - name: Run Lizard Analysis
        run: |
          lizard src/ \
            --language cpp \
            --CCN 10 \
            --length 75 \
            --xml > lizard_report.xml || true

      # Detaillierte Tabelle als GitHub Actions Job Summary ausgeben
      - name: Generate Summary
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, math

          tree = ET.parse("lizard_report.xml")
          root = tree.getroot()

          # Only function-level items (first <measure type="Function">)
          function_measure = root.find(".//measure[@type='Function']")
          items = function_measure.findall("item")

          if not items:
              print("Keine Funktionen gefunden.")
              exit(0)

          total_ccn  = 0
          total_vol  = 0
          count      = 0
          violations = []

          for item in items:
              values = [v.text for v in item.findall("value")]
              # values[0] = Nr., values[1] = NCSS, values[2] = CCN
              ncss = float(values[1])
              ccn  = float(values[2])
              name = item.get("name", "?")

              total_ccn += ccn
              total_vol += ncss * math.log2(max(ccn, 2))
              count     += 1

              if ccn > 10 or ncss > 75:
                  violations.append((name, int(ccn), int(ncss)))

          avg_ccn = total_ccn / count if count else 0
          avg_vol = total_vol / count if count else 0

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "/dev/stdout")
          with open(summary, "a") as f:
              f.write("## Lizard – Komplexitätsmetriken\n\n")
              f.write(f"| Metrik | Wert |\n")
              f.write(f"|--------|------|\n")
              f.write(f"| Analysierte Funktionen | **{count}** |\n")
              f.write(f"| Ø Zyklomatische Komplexität | **{avg_ccn:.2f}** |\n")
              f.write(f"| Ø Halstead Volume (approx.) | **{avg_vol:.1f}** |\n")
              f.write(f"| Schwellwert-Verletzungen | **{len(violations)}** |\n\n")

              if violations:
                  f.write("### ⚠️ Funktionen über Schwellwert (CCN > 10 oder Länge > 75)\n\n")
                  f.write("| Funktion | CCN | NCSS |\n")
                  f.write("|----------|-----|------|\n")
                  for name, ccn, ncss in violations:
                      f.write(f"| `{name}` | {ccn} | {ncss} |\n")
              else:
                  f.write("✅ Alle Funktionen liegen innerhalb der Schwellwerte.\n")
          EOF

      - name: Quality Gate
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET

          tree = ET.parse("lizard_report.xml")
          root = tree.getroot()

          function_measure = root.find(".//measure[@type='Function']")
          violations = []
          for item in function_measure.findall("item"):
              values = [v.text for v in item.findall("value")]
              ncss = float(values[1])
              ccn  = float(values[2])
              if ccn > 10 or ncss > 75:
                  violations.append(item.get("name"))

          print(f"Verletzungen: {len(violations)}/5 erlaubt")

          if len(violations) > 5:
              print(f"::error::Quality Gate fehlgeschlagen: {len(violations)} Funktionen "
                    f"überschreiten die Komplexitätsschwelle (max. 5 erlaubt)")
              exit(1)
          EOF

      - name: Upload Lizard Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lizard-complexity-report
          path: lizard_report.xml


  # Build/Test-Job
  Test:
    name: ${{matrix.os}} ${{matrix.compiler}} ${{matrix.build_type}} ${{matrix.packaging_maintainer_mode == 'ON' && '(maintainer mode)' || ''}}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false

      # Recommendations:
      #   * support at least 2 operating systems
      #   * support at least 2 compilers
      #   * make sure all supported configurations for your project are built
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        compiler:
          # you can specify the version after `-` like "llvm-15.0.2".
          - llvm-19.1.1
          - gcc-14
        generator:
          - "Ninja Multi-Config"
        build_type:
          - Release
          - Debug
        packaging_maintainer_mode:
          - ON
          - OFF
        build_shared:
          - OFF

        exclude:
          # mingw is determined by this author to be too buggy to support
          - os: windows-latest
            compiler: gcc-14
            
          # SFML only supports clang for MacOS
          - os: macos-latest
            compiler: gcc-14

        include:
          # Add appropriate variables for gcov version required. This will intentionally break
          # if you try to use a compiler that does not have gcov set
          - compiler: gcc-14
            gcov_executable: gcov-14
            enable_ipo: On

          - compiler: llvm-19.1.1
            enable_ipo: Off
            gcov_executable: "llvm-cov gcov"

          - os: macos-latest
            enable_ipo: Off

          # Set up preferred package generators, for given build configurations
          - build_type: Release
            packaging_maintainer_mode: On
            package_generator: TBZ2

          # This exists solely to make sure a non-multiconfig build works
          - os: ubuntu-latest
            compiler: gcc-14
            generator: "Unix Makefiles"
            build_type: Debug
            gcov_executable: gcov-14
            packaging_maintainer_mode: On
            enable_ipo: Off
          
          # Windows msvc builds
          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Debug
            packaging_maintainer_mode: On
            enable_ipo: On

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: On
            enable_ipo: On

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Debug
            packaging_maintainer_mode: Off

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: Off
            package_generator: ZIP

          - os: windows-latest
            compiler: msvc
            generator: "Visual Studio 17 2022"
            build_type: Release
            packaging_maintainer_mode: On
            enable_ipo: On
            build_shared: On


    steps:
      - name: Check for llvm version mismatches
        if: ${{ contains(matrix.compiler, 'llvm') && !contains(matrix.compiler, env.CLANG_TIDY_VERSION) }}
        uses: actions/github-script@v7
        with:
          script: |
            core.setFailed('There is a mismatch between configured llvm compiler and clang-tidy version chosen')

      - uses: actions/checkout@v3

      - name: Setup Cache
        uses: ./.github/actions/setup_cache
        with:
          compiler: ${{ matrix.compiler }}
          build_type: ${{ matrix.build_type }}
          packaging_maintainer_mode: ${{ matrix.packaging_maintainer_mode }}
          generator: ${{ matrix.generator }}

      - name: Project Name
        uses: cardinalby/export-env-action@v2
        with:
          envFile: '.github/constants.env'


      - name: Setup Cpp
        uses: aminya/setup-cpp@v1
        with:
          compiler: ${{ matrix.compiler }}
          vcvarsall: ${{ contains(matrix.os, 'windows' )}}

          cmake: true
          ninja: true
          vcpkg: false
          ccache: true
          clangtidy: ${{ env.CLANG_TIDY_VERSION }}


          cppcheck: true

          gcovr: true
          opencppcoverage: true
      
      - name: Linux - Additional Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libxrandr-dev \
            libxcursor-dev \
            libxi-dev \
            libudev-dev \
            libfreetype-dev \
            libflac-dev \
            libvorbis-dev \
            libgl1-mesa-dev \
            libegl1-mesa-dev \
            libfreetype-dev
            
      - name: MacOS - Additional Dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install freetype flac libvorbis mesa

      - name: Configure CMake
        run: |
          cmake -S . -B ./build -G "${{matrix.generator}}" -D${{ env.PROJECT_NAME }}_ENABLE_IPO=${{matrix.enable_ipo }} -DCMAKE_BUILD_TYPE:STRING=${{matrix.build_type}} -D${{ env.PROJECT_NAME }}_PACKAGING_MAINTAINER_MODE:BOOL=${{matrix.packaging_maintainer_mode}} -D${{ env.PROJECT_NAME }}_ENABLE_COVERAGE:BOOL=${{ matrix.build_type == 'Debug' }} -DGIT_SHA:STRING=${{ github.sha }}

      - name: Build
        # Execute the build.  You can specify a specific target with "--target <NAME>"
        run: |
          cmake --build ./build --config ${{matrix.build_type}}

      - name: Linux - Test and coverage
        if: runner.os == 'Linux'
        working-directory: ./build
        run: |
          xvfb-run ctest -C ${{matrix.build_type}} --output-on-failure --extra-verbose 2>&1 | tee ctest_output.log || true
          cat ./Testing/Temporary/LastTest.log
          gcovr -j ${{env.nproc}} --root ../ --print-summary --xml-pretty --xml coverage.xml . --gcov-executable '${{ matrix.gcov_executable }}'

      - name: MacOS - Test and coverage
        if: runner.os == 'macOS'
        working-directory: ./build
        run: |
          ctest -C ${{matrix.build_type}}
          gcovr -j ${{env.nproc}} --root ../ --print-summary --xml-pretty --xml coverage.xml . --gcov-executable '${{ matrix.gcov_executable }}'

      - name: Windows - Test and coverage
        if: runner.os == 'Windows'
        working-directory: ./build
        run: |
          OpenCppCoverage.exe --export_type cobertura:coverage.xml --cover_children -- ctest -C ${{matrix.build_type}}

      - name: CPack
        if: matrix.package_generator != ''
        working-directory: ./build
        run: |
          cpack -C ${{matrix.build_type}} -G ${{matrix.package_generator}}

      - name: Publish Tagged Release
        uses: softprops/action-gh-release@v2
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.package_generator != '' }}
        with:
          files: |
            build/*-*${{ matrix.build_type }}*-*.*
        env: 
          GITHUB_TOKEN: ${{ secrets.REPO_PAT }}

      # TODO enable
      # - name: Publish to codecov
        # uses: codecov/codecov-action@v5
        # with:
          # fail_ci_if_error: true # we weren't posting previously
          # flags: ${{ runner.os }}
          # name: ${{ runner.os }}-coverage
          # token: ${{ secrets.CODECOV_TOKEN }}
          # files: ./build/coverage.xml